---
apiVersion: gizclaw.admin/v1alpha1
kind: Workflow
metadata:
  name: doubao-realtime-conversation
  description: Doubao realtime duplex workflow
spec:
  driver: doubao-realtime
  doubao_realtime:
    model: doubao-realtime-dialog
    instructions: 你是一个简短、自然的中文语音聊天助手。
    audio:
      input:
        format:
          type: speech_opus
          rate: 16000
      output:
        format:
          type: ogg_opus
          rate: 24000
        voice: zh_female_vv_jupiter_bigtts
        speed: 0
        loudness: 0
    tools:
      - type: function
        name: get_weather
        description: 查询指定城市的当前天气。
        strict: true
        parameters:
          type: object
          additionalProperties: false
          required:
            - city
          properties:
            city:
              type: string
