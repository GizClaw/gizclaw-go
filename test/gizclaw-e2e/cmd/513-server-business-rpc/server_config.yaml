listen: "__LISTEN_ADDR__"
storage:
  memory:
    kind: keyvalue
    memory: {}
  local-files:
    kind: objectstore
    fs:
      dir: .
  acl-db:
    kind: sql
    sqlite:
      dir: data/acl.sqlite
  history-db:
    kind: sql
    sqlite:
      dir: data/history.sqlite
stores:
  peers:
    kind: keyvalue
    storage: memory
    prefix: peers
  credentials:
    kind: keyvalue
    storage: memory
    prefix: credentials
  firmwares:
    kind: keyvalue
    storage: memory
    prefix: firmwares
  minimax-tenants:
    kind: keyvalue
    storage: memory
    prefix: minimax-tenants
  models:
    kind: keyvalue
    storage: memory
    prefix: models
  voices:
    kind: keyvalue
    storage: memory
    prefix: voices
  workspaces:
    kind: keyvalue
    storage: memory
    prefix: workspaces
  workflows:
    kind: keyvalue
    storage: memory
    prefix: workflows
  pet-species:
    kind: keyvalue
    storage: memory
    prefix: pet-species
  pet-species-assets:
    kind: objectstore
    storage: local-files
    prefix: pet-species
  badges:
    kind: keyvalue
    storage: memory
    prefix: badges
  badge-assets:
    kind: objectstore
    storage: local-files
    prefix: badges
  pets:
    kind: keyvalue
    storage: memory
    prefix: pets
  rewards:
    kind: keyvalue
    storage: memory
    prefix: rewards
  wallets:
    kind: sql
    storage: history-db
  acl:
    kind: sql
    storage: acl-db
  history:
    kind: sql
    storage: history-db
peers:
  store: peers
credentials:
  store: credentials
firmwares:
  store: firmwares
minimax:
  tenants-store: minimax-tenants
  voices-store: voices
  credentials-store: credentials
models:
  store: models
voices:
  store: voices
workspaces:
  store: workspaces
workflows:
  store: workflows
acl:
  store: acl
history:
  store: history
pet_species:
  store: pet-species
  assets_store: pet-species-assets
badges:
  store: badges
  assets_store: badge-assets
pets:
  store: pets
rewards:
  store: rewards
wallets:
  store: wallets
system_tasks:
  reward_claim:
    generator: model/reward-claim
    cooldown: 1ms
  pet_action:
    generator: model/pet-action
