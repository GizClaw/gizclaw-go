listen: "__LISTEN_ADDR__"
storage:
  memory:
    kind: keyvalue
    memory: {}
  local-files:
    kind: filesystem
    fs:
      dir: .
  firmware-depot:
    kind: depotstore
    depot-fs: {}
stores:
  peers:
    kind: keyvalue
    storage: memory
    prefix: peers
  credentials:
    kind: keyvalue
    storage: memory
    prefix: credentials
  minimax-tenants:
    kind: keyvalue
    storage: memory
    prefix: minimax-tenants
  voices:
    kind: keyvalue
    storage: memory
    prefix: voices
  workspaces:
    kind: keyvalue
    storage: memory
    prefix: workspaces
  workflows:
    kind: keyvalue
    storage: memory
    prefix: workflows
  firmware-depots:
    kind: keyvalue
    storage: memory
    prefix: firmware-depots
  firmware:
    kind: depotstore
    storage: firmware-depot
    depot-fs:
      filesystem:
        storage: local-files
        base-dir: firmware
peers:
  store: missing-store
credentials:
  store: credentials
minimax:
  tenants-store: minimax-tenants
  voices-store: voices
  credentials-store: credentials
workspaces:
  store: workspaces
workflows:
  store: workflows
depots:
  store: firmware
  metadata-store: firmware-depots
