name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-amd64:
    name: Linux amd64 Release Binary
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Ensure Git LFS assets are available
        run: git lfs pull

      - name: Build gizclaw Linux amd64 binary
        run: ./build/build-linux-amd64.sh

      - name: Verify release binary on Ubuntu 24.04
        run: |
          file .tmp/deploy/gizclaw-linux-amd64
          docker run --rm --platform linux/amd64 \
            -v "$PWD/.tmp/deploy:/out:ro" \
            ubuntu:24.04 \
            sh -lc 'ldd /out/gizclaw-linux-amd64 && /out/gizclaw-linux-amd64 --help >/dev/null'

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gizclaw-linux-amd64
          path: .tmp/deploy/gizclaw-linux-amd64
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          short_sha="${GITHUB_SHA::7}"
          tag="main-build-${GITHUB_RUN_NUMBER}-${short_sha}"
          asset=".tmp/deploy/gizclaw-linux-amd64"
          asset_name="gizclaw-linux-amd64"
          gh release create "$tag" "$asset#$asset_name" \
            --target "$GITHUB_SHA" \
            --title "main build ${short_sha}" \
            --notes "Automated release for ${GITHUB_SHA}."

      - name: Prune old automated releases
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          retain=10
          mapfile -t old_tags < <(
            gh release list --limit 100 --order desc --json tagName \
              --jq '.[] | select(.tagName | startswith("main-build-")) | .tagName' \
              | tail -n +"$((retain + 1))"
          )

          for tag in "${old_tags[@]}"; do
            gh release delete "$tag" --yes --cleanup-tag
          done
